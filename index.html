<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorização - Tabuada</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.question {
    font-size: 28px;
    margin: 20px 0;
}

input {
    padding: 10px;
    font-size: 18px;
    width: 100px;
    text-align: center;
}

button {
    padding: 10px 15px;
    margin: 6px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.check { background-color: #4e73df; color: white; }
.next { background-color: #1cc88a; color: white; }
.invert { background-color: #f6c23e; color: black; }
.history-btn { 
    background-color: #858796; color: white;
    width: 200px;
 }
.reload-btn { 
    background-color: #545663; color: white;
    display: block;
    margin: 6px auto;
 }

.feedback {
    margin-top: 10px;
    font-weight: bold;
}

.score {
    margin-top: 15px;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 20px;
    width: 320px;
    border-radius: 10px;
    max-height: 400px;
    overflow-y: auto;
    position: relative;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 20px;
    cursor: pointer;
}

.history-item {
    padding: 8px;
    margin: 5px 0;
    border-radius: 5px;
    font-weight: bold;
}

.correct-item {
    background-color: #d4edda;
    color: #155724;
}

.wrong-item {
    background-color: #f8d7da;
    color: #721c24;
}
</style>
</head>

<body>

<div class="container">
    <h1>Memorização Tabuada</h1>
    <div class="question" id="question"></div>
    <input type="number" id="answer" placeholder="Resposta">
    <br>
    <button class="check" id="checkBtn" onclick="checkAnswer()">Verificar</button>
    <button class="invert" onclick="invert()">Inverter</button>
    <button class="next" id="nextBtn" onclick="nextQuestion()" disabled>Próxima</button>
    <button class="history-btn" onclick="openModal()">Histórico</button>
    <button class="reload-btn" onclick="reloadPage()">Recarregar</button>
    <div class="feedback" id="feedback"></div>
    <div class="score">
        Acertos: <span id="correct">0</span> |
        Erros: <span id="wrong">0</span>
    </div>
</div>

<!-- Modal -->
<div id="historyModal" class="modal">
    <div class="modal-content" id="modalContent">
        <span class="close" onclick="closeModal()">×</span>
        <h3>Histórico</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let current;
let inverted = false;
let correctCount = 0;
let wrongCount = 0;
let history = [];

function generateQuestions() {
    for (let i = 2; i <= 10; i++) {
        for (let j = i; j <= 10; j++) {
            questions.push({a: i, b: j});
        }
    }
    questions.sort(() => Math.random() - 0.5);
}

function showQuestion() {
    if (currentIndex >= questions.length) {
        document.getElementById("question").innerText = "🎉 Você finalizou!";
        document.getElementById("feedback").innerText = "Recarregue a página para recomeçar.";
        document.getElementById("checkBtn").disabled = true;
        document.getElementById("nextBtn").disabled = true;
        return;
    }

    current = questions[currentIndex];
    inverted = false;

    document.getElementById("question").innerText = `${current.a} x ${current.b}`;
    document.getElementById("answer").value = "";
    document.getElementById("feedback").innerText = "";

    document.getElementById("checkBtn").disabled = false;
    document.getElementById("nextBtn").disabled = true;
}

function checkAnswer() {
    const userAnswer = Number(document.getElementById("answer").value);
    const correctAnswer = current.a * current.b;

    let record = {
        question: `${current.a} x ${current.b}`,
        correctAnswer: correctAnswer,
        userAnswer: userAnswer,
        correct: userAnswer === correctAnswer
    };

    history.push(record);

    if (record.correct) {
        document.getElementById("feedback").innerText = "✅ Correto!";
        document.getElementById("feedback").style.color = "green";
        correctCount++;
        document.getElementById("correct").innerText = correctCount;
    } else {
        document.getElementById("feedback").innerText = `❌ Errado! Resposta: ${correctAnswer}`;
        document.getElementById("feedback").style.color = "red";
        wrongCount++;
        document.getElementById("wrong").innerText = wrongCount;
    }

    document.getElementById("checkBtn").disabled = true;
    document.getElementById("nextBtn").disabled = false;
}

function nextQuestion() {
    currentIndex++;
    showQuestion();
}

function invert() {
    inverted = !inverted;
    if (inverted) {
        document.getElementById("question").innerText = `${current.b} x ${current.a}`;
    } else {
        document.getElementById("question").innerText = `${current.a} x ${current.b}`;
    }
}

/* Modal */
function openModal() {
    const modal = document.getElementById("historyModal");
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    if (history.length === 0) {
        list.innerHTML = "<p>Nenhuma resposta ainda.</p>";
    } else {
        history.forEach(item => {
            const div = document.createElement("div");
            div.classList.add("history-item");
            div.classList.add(item.correct ? "correct-item" : "wrong-item");
            div.innerHTML = item.correct 
                ? `✔ ${item.question} = ${item.correctAnswer}`
                : `✖ ${item.question} = ${item.correctAnswer} (Você: ${item.userAnswer})`;
            list.appendChild(div);
        });
    }

    modal.style.display = "block";
}

function closeModal() {
    document.getElementById("historyModal").style.display = "none";
}

function reloadPage() {
    location.reload(true)
}

// Fecha clicando fora
window.onclick = function(event) {
    const modal = document.getElementById("historyModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}

generateQuestions();
showQuestion();
</script>

</body>
</html>
